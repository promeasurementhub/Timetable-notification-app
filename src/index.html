<!doctype html>
<html lang="th">
  <head>
    <meta charset="utf-8" />
    <title>ระบบตารางเรียนอัจฉริยะ (สพฐ. OBEC Core Sync)</title>
    <meta name="description" content="ระบบสนับสนุนการจัดกิจกรรมการเรียนรู้และตารางเรียนอัจฉริยะ ตามหลักสูตรแกนกลางการศึกษาขั้นพื้นฐาน (สพฐ.) กระทรวงศึกษาธิการ สำหรับโรงเรียน มัธยมศึกษา และประถมศึกษา" />
    <meta name="keywords" content="สพฐ, ตารางเรียน, ตารางอบรม, ปฏิทินการศึกษา, พัฒนาผู้เรียน, กระทรวงศึกษาธิการ, OBEC, timetable, school, class schedule, education, Thailand" />
    <meta name="category" content="Education" />
    <meta name="rating" content="safe for kids" />
    <meta name="author" content="ระบบสื่อการเรียนรู้ดิจิทัล" />
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" type="image/svg+xml" href="/app-icon-v5.svg" />
    <link rel="manifest" href="/manifest.json?v=10" />
    <meta name="theme-color" content="#ffffff" />
    <link rel="apple-touch-icon" href="/app-icon-v5.svg" />
  </head>
  <body>
    <app-root></app-root>
    <script>
      window.deferredPrompt = null;
      window.addEventListener("beforeinstallprompt", (e) => {
        e.preventDefault();
        window.deferredPrompt = e;
        window.dispatchEvent(new CustomEvent("pwa-install-available"));
      });

      function registerServiceWorker() {
        if ("serviceWorker" in navigator) {
          navigator.serviceWorker.register("/firebase-messaging-sw.js", { type: "module" }).then(
            (registration) => {
              console.log(
                "ServiceWorker registration successful with scope: ",
                registration.scope,
              );
            },
            (err) => {
              console.log("ServiceWorker registration failed: ", err);
            },
          );
        }
      }

      if (document.readyState === "complete" || document.readyState === "interactive") {
        registerServiceWorker();
      } else {
        window.addEventListener("load", registerServiceWorker);
      }
    </script>
  </body>
</html>
