name: Sync to Another Account

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout current repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false
          
      - name: Push to Destination Repository
        env:
          DESTINATION_TOKEN: ${{ secrets.DESTINATION_TOKEN }}
          DESTINATION_USERNAME: "promeasurementhub"
          DESTINATION_REPO: "Timetable-notification-app"
        run: |
          if [ -z "$DESTINATION_TOKEN" ]; then
            echo "Error: DESTINATION_TOKEN is not set in GitHub Secrets."
            echo "Please go to Settings > Secrets and variables > Actions and add 'DESTINATION_TOKEN'."
            exit 1
          fi
          
          # ตั้งค่า Email ตามที่ระบุ
          git config --global user.email "khaophan.po@gmail.com"
          git config --global user.name "GitHub Sync Action"
          
          echo "Syncing to https://github.com/$DESTINATION_USERNAME/$DESTINATION_REPO"
          echo "Note: If you get 'Repository not found', please make sure:"
          echo "1. The destination repository ($DESTINATION_REPO) is already created in the target account."
          echo "2. DESTINATION_TOKEN (Personal Access Token) has 'repo' permissions."
          
          # ยกเลิก config เดิมที่ actions/checkout อาจจะทิ้งไว้
          git config --local --unset-all "http.https://github.com/.extraheader" || true
          
          # วิธีที่ 1: ใช้ Standard PAT URL (แนะนำสำหรับ Personal Access Token / Fine-grained PAT)
          DEST_REPO_URL_PAT="https://${DESTINATION_TOKEN}@github.com/${DESTINATION_USERNAME}/${DESTINATION_REPO}.git"
          
          echo "Trying sync using Standard PAT URL format..."
          if git push "$DEST_REPO_URL_PAT" HEAD:main --force; then
            echo "✅ Successfully synced to destination repository using standard PAT URL!"
          else
            echo "⚠️ Standard PAT URL push failed or returned an error. Trying fallback with x-access-token format..."
            
            # วิธีที่ 2: ใช้ x-access-token (สำหรับกรณีที่เป็นการตั้งค่าแบบ OAuth หรือ token รูปแบบเฉพาะ)
            DEST_REPO_URL_ALT="https://x-access-token:${DESTINATION_TOKEN}@github.com/${DESTINATION_USERNAME}/${DESTINATION_REPO}.git"
            
            if git push "$DEST_REPO_URL_ALT" HEAD:main --force; then
              echo "✅ Successfully synced to destination repository using x-access-token fallback!"
            else
              echo "❌ Both push methods failed. Please check your DESTINATION_TOKEN permissions and ensure the destination repository exists."
              exit 1
            fi
          fi
