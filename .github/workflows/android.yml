name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Inject API Key
        run: |
          sed -i "s/REPLACE_ME_GEMINI_API_KEY/${{ secrets.GEMINI_API_KEY }}/g" src/environments/environment.ts
        if: env.HAS_SECRET == 'true'
        env:
          HAS_SECRET: ${{ secrets.GEMINI_API_KEY != '' }}

      - name: Build Angular App
        run: |
          npm run build
          # คืนค่า BROWSER_DIR อย่างแม่นยำ
          BROWSER_DIR=$(find dist -name "browser" -type d | head -n 1)
          if [ -z "$BROWSER_DIR" ]; then BROWSER_DIR="dist/app"; fi
          
          # ใช้การ copy แทน symlink เพื่อความรัดกุมในการทำงานของ Capacitor
          rm -rf www
          mkdir www
          cp -r "$BROWSER_DIR"/. www/
          echo "Sync output to ./www completed"

      - name: Capacitor Sync
        run: |
          # Ensure android platform exists
          if [ ! -d "android" ]; then
            npx cap add android
          fi
          
          # Patch project to use Android SDK 35 (Required by WorkManager 2.10.5+)
          # This is critical because many modern Capacitor plugins depend on SDK 35 libraries
          if [ -f "android/variables.gradle" ]; then
            sed -i 's/compileSdkVersion = .*/compileSdkVersion = 35/' android/variables.gradle
            sed -i 's/targetSdkVersion = .*/targetSdkVersion = 35/' android/variables.gradle
            sed -i 's/minSdkVersion = .*/minSdkVersion = 22/' android/variables.gradle
            echo "Successfully patched variables.gradle to SDK 35"
          fi
          
          # Patch app/build.gradle directly to ensure compileSdk is set
          # Some versions of Capacitor might ignore variables.gradle for certain fields
          if [ -f "android/app/build.gradle" ]; then
            sed -i 's/compileSdk .*/compileSdk 35/' android/app/build.gradle
            # Also ensure namespace is present if missing (for newer AGP versions)
            echo "Successfully patched app/build.gradle to SDK 35"
          fi

          npx cap sync android

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'zulu'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: |
          chmod +x android/gradlew
          cd android && ./gradlew --version

      - name: Build APK (Debug)
        working-directory: android
        run: ./gradlew assembleDebug --stacktrace --no-daemon --console=plain

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
