name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Inject API Key
        run: |
          sed -i "s/REPLACE_ME_GEMINI_API_KEY/${{ secrets.GEMINI_API_KEY }}/g" src/environments/environment.ts
        if: env.HAS_SECRET == 'true'
        env:
          HAS_SECRET: ${{ secrets.GEMINI_API_KEY != '' }}

      - name: Build Angular App
        run: |
          npm run build
          # คืนค่า BROWSER_DIR อย่างแม่นยำ
          BROWSER_DIR=$(find dist -name "browser" -type d | head -n 1)
          if [ -z "$BROWSER_DIR" ]; then BROWSER_DIR="dist/app"; fi
          
          # ใช้การ copy แทน symlink เพื่อความรัดกุมในการทำงานของ Capacitor
          rm -rf www
          mkdir www
          cp -r "$BROWSER_DIR"/. www/
          echo "Sync output to ./www completed"

      - name: Capacitor Sync
        run: |
          # 1. บังคับสร้าง Platform ใหม่หากจำเป็น
          if [ ! -d "android" ]; then
            npx cap add android
          fi
          
          # 2. ปรับปรุง variables.gradle (หัวใจหลักของ Capacitor Android)
          if [ -f "android/variables.gradle" ]; then
            sed -i 's/compileSdkVersion = .*/compileSdkVersion = 35/' android/variables.gradle
            sed -i 's/targetSdkVersion = .*/targetSdkVersion = 35/' android/variables.gradle
            sed -i 's/minSdkVersion = .*/minSdkVersion = 22/' android/variables.gradle
            echo "SUCCESS: Variables.gradle patched to SDK 35"
          fi
          
          # 3. เทคนิคขั้นสูง: บังคับ SDK 35 ในทุก Sub-projects (ปลั๊กอินทั้งหมด)
          # เราจะแทรกคำสั่ง force ไปที่ root build.gradle เพื่อให้ทุก plugins ต้องทำตาม
          ROOT_GRADLE="android/build.gradle"
          if [ -f "$ROOT_GRADLE" ]; then
            if ! grep -q "subprojects" "$ROOT_GRADLE"; then
              cat >> "$ROOT_GRADLE" <<EOF

subprojects {
    afterEvaluate { project ->
        if (project.hasProperty('android')) {
            project.android {
                if (namespace == null) {
                    namespace project.group
                }
                compileSdk 35
                defaultConfig {
                    targetSdk 35
                }
            }
        }
    }
}
EOF
              echo "SUCCESS: Root build.gradle patched with subprojects force SDK 35"
            fi
          fi

          # 4. ปรับปรุง build.gradle ของ App แบบเจาะจง
          if [ -f "android/app/build.gradle" ]; then
            sed -i 's/compileSdk .*/compileSdk 35/' android/app/build.gradle
            sed -i 's/targetSdk .*/targetSdk 35/' android/app/build.gradle
            echo "SUCCESS: App build.gradle patched to SDK 35"
          fi

          # 5. ค้นหาและเปลี่ยนแบบครอบคลุม (Deep Scan)
          grep -rl "compileSdk 34" android | xargs sed -i 's/compileSdk 34/compileSdk 35/g' || true
          grep -rl "targetSdk 34" android | xargs sed -i 's/targetSdk 34/targetSdk 35/g' || true
          grep -rl "compileSdkVersion 34" android | xargs sed -i 's/compileSdkVersion 34/compileSdkVersion 35/g' || true
          grep -rl "targetSdkVersion 34" android | xargs sed -i 's/targetSdkVersion 34/targetSdkVersion 35/g' || true
          
          # 6. แสดงผลเพื่อการตรวจสอบ (Verification)
          echo "Final Verification of SDK versions:"
          grep -r "compileSdk" android | grep "35" | head -n 5 || echo "No SDK 35 found?"

          npx cap sync android

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'zulu'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: |
          chmod +x android/gradlew
          cd android && ./gradlew --version

      - name: Build APK (Debug)
        working-directory: android
        run: ./gradlew assembleDebug --stacktrace --no-daemon --console=plain

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
