name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # ให้สิทธิ์เขียนเพื่อสร้าง GitHub Release สำหรับ OTA
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Inject API Key
        run: |
          if [ -n "${GEMINI_API_KEY}" ]; then
            # Inject into environment.ts
            sed -i "s|REPLACE_ME_GEMINI_API_KEY|${GEMINI_API_KEY}|g" src/environments/environment.ts || true
            # Inject into angular.json for define replacements
            sed -i "s|YOUR_GEMINI_API_KEY|${GEMINI_API_KEY}|g" angular.json || true
            echo "API Key injected successfully."
          else
            echo "No API Key found in secrets."
          fi
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Build Angular App
        run: |
          npm run build
          # คืนค่า BROWSER_DIR อย่างแม่นยำ
          BROWSER_DIR=$(find dist -name "browser" -type d | head -n 1)
          if [ -z "$BROWSER_DIR" ]; then 
            BROWSER_DIR=$(find dist -name "*" -type d -maxdepth 2 | head -n 1)
            echo "Fallback: Using $BROWSER_DIR as build directory"
          fi
          
          # ใช้การ copy แทน symlink เพื่อความรัดกุมในการทำงานของ Capacitor
          rm -rf www
          mkdir www
          cp -r "$BROWSER_DIR"/. www/
          echo "Sync output to ./www completed"

      - name: Publish OTA Update to GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 1. Zip the assets
          cd www
          zip -r ../update.zip * -q
          cd ..
          
          # 2. Create version.json using Unix Timestamp as version
          TIMESTAMP=$(date +%s)
          echo "{\"version\": \"$TIMESTAMP\", \"short_hash\": \"${GITHUB_SHA::7}\"}" > version.json
          
          # 3. Create or Update GitHub Release named 'ota-latest'
          gh release view ota-latest || gh release create ota-latest --title "OTA Update (Latest)" --notes "Auto-generated OTA release for Capacitor Updater"
          gh release upload ota-latest update.zip version.json --clobber
          echo "OTA Update artifacts uploaded successfully."

      - name: Capacitor Sync
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi
          npx cap sync android

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'zulu'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: |
          chmod +x android/gradlew
          cd android && ./gradlew --version

      - name: Build APK (Debug)
        working-directory: android
        run: ./gradlew assembleDebug --stacktrace --no-daemon --console=plain

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
